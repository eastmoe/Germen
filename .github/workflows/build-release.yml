name: Build release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.2.2"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  compatibility:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run compatibility smoke checks
        run: |
          python -m compileall -q src
          python -c "import germen, germen.cli, germen.app_config, germen.coordinates, germen.workflow, germen.win_input, germen.click, germen.web.main; print(germen.__version__)"
          python -m germen --help

  build:
    name: Build py3-any package
    runs-on: ubuntu-latest
    needs: compatibility
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Verify wheel tag
        run: |
          python -c "from pathlib import Path; wheels=list(Path('dist').glob('*.whl')); assert len(wheels)==1, wheels; name=wheels[0].name; assert name.endswith('-py3-none-any.whl'), name; print(name)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: germen-dist
          path: dist/*
          if-no-files-found: error

  build-windows-exe:
    name: Build standalone Windows EXE
    runs-on: windows-latest
    needs: compatibility
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install application and packager
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build standalone executable
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name germen --collect-all cv2 scripts/pyinstaller_entry.py

      - name: Smoke test executable without Python
        shell: pwsh
        run: |
          $cleanPath = "$env:SystemRoot\System32;$env:SystemRoot"
          $output = & cmd /d /c "set PATH=$cleanPath&& dist\germen.exe --help"
          if ($LASTEXITCODE -ne 0) { throw "germen.exe --help failed with exit code $LASTEXITCODE" }
          if (($output -join "`n") -notmatch "Germen command launcher") { throw "Unexpected help output: $output" }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: germen-windows-exe
          path: dist/germen.exe
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [build, build-windows-exe]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: germen-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.tag_name }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/*
